  <rect x="228" y="352" width="840" height="96" rx="22" fill="#121A15" stroke="#25332B"/>
  <text x="262" y="394" fill="#E6F2EA" font-family="Arial, sans-serif" font-size="30" font-weight="700">Cria conta ou entra, depois confirma a ligação</text>
  <text x="262" y="426" fill="#93AB9D" font-family="Arial, sans-serif" font-size="22">O upload inicial envia os dados atuais para a tua área privada no Supabase.</text>
