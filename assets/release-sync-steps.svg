  <text x="262" y="258" fill="#E6F2EA" font-family="Arial, sans-serif" font-size="30" font-weight="700">No desktop, abre o botão ☁ na barra lateral</text>
  <text x="262" y="290" fill="#93AB9D" font-family="Arial, sans-serif" font-size="22">A FinancialApp continua local, mas fica pronta para sincronizar quando quiseres.</text>
