  <text x="262" y="530" fill="#E6F2EA" font-family="Arial, sans-serif" font-size="30" font-weight="700">Abre a versão web e usa a mesma conta</text>
  <text x="262" y="562" fill="#93AB9D" font-family="Arial, sans-serif" font-size="22">A partir daí tens Resumo, Projetos, Importar e Categorias no telemóvel.</text>
